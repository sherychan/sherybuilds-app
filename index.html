<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shery builds</title>
<style>
  :root {
    --bg: #0e0e11;
    --fg: #f2f2f0;
    --muted: #8b8b96;
    --line: #26262e;
    --accent: #7aa2f7;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fbfbf9;
      --fg: #16161a;
      --muted: #6b6b76;
      --line: #e4e4e0;
      --accent: #3b5bdb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 12vh 6vw;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.6 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 34rem; margin: 0 auto; }
  h1 {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 0.4rem;
  }
  .sub { color: var(--muted); margin: 0 0 3.5rem; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { border-top: 1px solid var(--line); }
  li:last-child { border-bottom: 1px solid var(--line); }
  a.item {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 1.1rem 0.25rem;
    color: inherit;
    text-decoration: none;
  }
  a.item:hover { color: var(--accent); }
  a.item:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .name { font-weight: 500; }
  .desc { color: var(--muted); font-size: 0.9rem; flex: 1; }
  .year { color: var(--muted); font-size: 0.85rem; font-variant-numeric: tabular-nums; }
  @media (max-width: 34rem) {
    a.item { flex-wrap: wrap; gap: 0.25rem 1rem; }
    .desc { flex-basis: 100%; }
  }
</style>
</head>
<body>
<main>
  <h1>shery builds</h1>
  <p class="sub">Things I&rsquo;ve made.</p>

  <ul>
    <li>
      <a class="item" href="/pq34/">
        <span class="name">PQ34</span>
        <span class="desc">A birthday side-scroller. 42 memories, no build step.</span>
        <span class="year">2026</span>
      </a>
    </li>
  </ul>
</main>
</body>
</html>
